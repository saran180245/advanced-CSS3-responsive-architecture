<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Saranya Portfolio</title>

    <meta name="description" content="Get in touch with Saranya for projects, collaborations, or job opportunities.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="themeToggle" class="theme-btn">
    Dark / Light
</button>

<header>
    <h1>Contact Me</h1>

    <nav aria-label="Contact Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

<section aria-labelledby="contact-heading">

    <h2 id="contact-heading">Get In Touch</h2>

    <p>
        Feel free to contact me regarding internships,
        freelance work, collaborations, or web development projects.
    </p>

    <form action="#" method="post" aria-label="Contact Form">

        <label for="fullname">Full Name</label>
        <input
            type="text"
            id="fullname"
            name="fullname"
            required>

        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            required>

        <label for="subject">Subject</label>
        <input
            type="text"
            id="subject"
            name="subject">

        <label for="message">Message</label>
        <textarea
            id="message"
            name="message"
            rows="6"
            required></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

</main>

<footer>
    <p>&copy; 2026 Saranya. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
